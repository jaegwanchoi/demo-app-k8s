apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: note-app
  annotations:
    kubernetes.io/change-cause: "session2: initial deployment"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - name: web
          image: nginx:alpine
          ports:
            - containerPort: 80
