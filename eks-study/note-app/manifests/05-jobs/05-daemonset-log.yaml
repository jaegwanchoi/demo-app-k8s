apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: log-agent
  namespace: note-app
spec:
  selector:
    matchLabels:
      app: log-agent
  template:
    metadata:
      labels:
        app: log-agent
    spec:
      containers:
        - name: log-agent
          image: busybox:1.36
          command: ["sh", "-c"]
          args:
            - |
              while true; do
                echo "[log-agent] node=$(NODE_NAME) time=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
                sleep 15
              done
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          volumeMounts:
            - name: varlog
              mountPath: /host/var/log
              readOnly: true
      volumes:
        - name: varlog
          hostPath:
            path: /var/log
