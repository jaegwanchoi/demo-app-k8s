apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: log-agent
  namespace: note-app
spec:
  # DaemonSet은 replicas 없음 — 클러스터의 모든 노드에 자동으로 1개씩 배포
  # Docker Desktop: 노드 1개 → Pod 1개
  selector:
    matchLabels:
      app: log-agent
  template:
    metadata:
      labels:
        app: log-agent
    spec:
      containers:
        - name: log-agent
          image: busybox:1.36
          command: ["sh", "-c"]
          args:
            - |
              while true; do
                echo "[log-agent] node=$(NODE_NAME) time=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
                sleep 15
              done
          env:
            # Downward API: Pod 자신의 메타데이터를 환경변수로 참조
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          volumeMounts:
            - name: varlog
              mountPath: /host/var/log
              readOnly: true
      volumes:
        - name: varlog
          # hostPath: 노드의 실제 파일시스템을 마운트 — DaemonSet의 대표적 사용 패턴
          # 로그 수집 에이전트(Fluentd, Filebeat 등)가 이 방식으로 노드 로그에 접근
          hostPath:
            path: /var/log
