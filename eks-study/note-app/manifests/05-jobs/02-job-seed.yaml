apiVersion: batch/v1
kind: Job
metadata:
  name: seed
  namespace: note-app
spec:
  # backoffLimit 미지정 → 기본값 6 (6번 실패 시 Job 실패로 마킹)
  template:
    spec:
      # Job Pod은 restartPolicy가 Never 또는 OnFailure만 허용 (Always 불가)
      # Never: 실패 시 새 Pod을 생성해 재시도 (실패한 Pod 로그 보존)
      restartPolicy: Never
      containers:
        - name: seed
          image: python:3-slim
          command: ["sh", "-c"]
          args:
            - "pip install --quiet --no-cache-dir requests && python /script/seed.py"
          env:
            # K8s CoreDNS가 "http://api" → api 서비스 ClusterIP로 자동 resolve
            - name: API_URL
              value: "http://api"
          volumeMounts:
            - name: script
              mountPath: /script
      volumes:
        - name: script
          configMap:
            name: seed-script
