apiVersion: v1
kind: Secret
metadata:
  name: api-secret
  namespace: note-app
# base64 인코딩 필수 (암호화가 아님 — 누구나 decode 가능)
# echo -n "note-api-key-demo" | base64  →  bm90ZS1hcGkta2V5LWRlbW8=
data:
  api-key: bm90ZS1hcGkta2V5LWRlbW8=
# 실무: AWS Secrets Manager, HashiCorp Vault, External Secrets Operator 사용
