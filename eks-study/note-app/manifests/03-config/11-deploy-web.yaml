apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: note-app
  annotations:
    kubernetes.io/change-cause: "session3: nginx.conf via ConfigMap"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - name: web
          image: nginx:alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d
      volumes:
        - name: nginx-conf
          configMap:
            name: web-nginx
