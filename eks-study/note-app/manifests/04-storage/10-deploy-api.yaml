apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: note-app
  annotations:
    kubernetes.io/change-cause: "session4: PVC for persistent notes storage"
spec:
  # PVC는 ReadWriteOnce → 여러 Pod이 같은 PVC를 동시에 쓰기 불가 → replicas=1
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: python:3-slim
          command: ["sh", "-c"]
          args:
            - "pip install --quiet --no-cache-dir flask && python /app/app.py"
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: api-config
          env:
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: api-secret
                  key: api-key
            # ConfigMap의 DATA_DIR=/tmp를 /data로 덮어씀 (개별 env가 envFrom보다 우선)
            - name: DATA_DIR
              value: "/data"
          volumeMounts:
            - name: code
              mountPath: /app
            - name: data
              mountPath: /data  # notes.json이 여기에 저장 → Pod 재시작해도 유지
      volumes:
        - name: code
          configMap:
            name: api-code
        - name: data
          persistentVolumeClaim:
            claimName: api-data  # 01-pvc.yaml에서 정의한 PVC
