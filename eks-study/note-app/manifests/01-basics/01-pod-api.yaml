apiVersion: v1
kind: Pod
metadata:
  name: api
  namespace: note-app
  labels:
    app: api
spec:
  containers:
    - name: api
      image: python:3-slim
      command: ["sh", "-c"]
      args:
        - "pip install --quiet --no-cache-dir flask && python /app/app.py"
      ports:
        - containerPort: 8080
      volumeMounts:
        - name: code
          mountPath: /app
  volumes:
    - name: code
      configMap:
        name: api-code
