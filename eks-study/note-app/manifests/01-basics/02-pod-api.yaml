apiVersion: v1
kind: Pod
metadata:
  name: api
  namespace: note-app  # 이 Pod이 속할 Namespace
  labels:
    app: api           # Service의 selector가 이 라벨로 Pod을 찾음
spec:
  containers:
    - name: api
      image: python:3-slim
      command: ["sh", "-c"]
      args:
        # app.py는 이미지에 없음 → ConfigMap 볼륨 마운트로 런타임 주입
        - "pip install --quiet --no-cache-dir flask && python /app/app.py"
      ports:
        - containerPort: 8080
      volumeMounts:
        - name: code
          mountPath: /app  # ConfigMap 키=파일명, 값=파일내용으로 마운트됨
  volumes:
    - name: code
      configMap:
        name: api-code   # 00-cm-api-code.yaml에서 정의한 ConfigMap
