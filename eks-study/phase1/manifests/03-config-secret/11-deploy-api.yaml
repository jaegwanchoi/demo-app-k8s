apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: app-dev
  annotations:
    kubernetes.io/change-cause: "session3: real Flask + ConfigMap (envFrom)"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
        tier: backend
    spec:
      containers:
        - name: api
          image: python:3-slim
          command: ["sh", "-c"]
          args:
            - "pip install --quiet --no-cache-dir flask requests && python /app/api.py"
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: api-config
          volumeMounts:
            - name: code
              mountPath: /app
      volumes:
        - name: code
          configMap:
            name: api-code

