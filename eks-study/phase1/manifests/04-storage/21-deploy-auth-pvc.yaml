apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth
  namespace: app-dev
  annotations:
    kubernetes.io/change-cause: "session4 - PVC로 SQLite DB 영속화"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth
  template:
    metadata:
      labels:
        app: auth
    spec:
      initContainers:
        - name: install-deps
          image: python:3-slim
          command: ["pip", "install", "--target=/deps", "flask", "pyjwt"]
          volumeMounts:
            - name: deps
              mountPath: /deps
      containers:
        - name: auth
          image: python:3-slim
          command: ["python", "/app/auth.py"]
          env:
            - name: PYTHONPATH
              value: /deps
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: auth-secret
                  key: JWT_SECRET
            - name: LOG_LEVEL
              value: INFO
            - name: DB_PATH
              value: /data/users.db   # PVC에 저장 — Pod 재시작 후에도 보존
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: code
              mountPath: /app
            - name: deps
              mountPath: /deps
            - name: data
              mountPath: /data       # PVC 마운트
      volumes:
        - name: code
          configMap:
            name: auth-code
        - name: deps
          emptyDir: {}
        - name: data
          persistentVolumeClaim:
            claimName: auth-data     # 위에서 만든 PVC
